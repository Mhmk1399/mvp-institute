services:
  mongo:
    image: mongo:7
    container_name: newinstitute-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  realtime-gateway:
    build:
      context: .
      dockerfile: Dockerfile.realtime
    command: npm run realtime:gateway
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3001"
    depends_on:
      - mongo

volumes:
  mongo-data:
